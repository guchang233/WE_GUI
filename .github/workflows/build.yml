name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      minecraft_version: ${{ steps.meta.outputs.minecraft_version }}
      mod_version: ${{ steps.meta.outputs.mod_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read project metadata
        id: meta
        run: |
          echo "minecraft_version=$(grep '^minecraft_version=' gradle.properties | cut -d= -f2)" >> $GITHUB_OUTPUT
          echo "mod_version=$(grep '^mod_version=' gradle.properties | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v5
        with:
          name: WeGui-${{ github.run_number }}
          path: build/libs/*.jar
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          name: WeGui-${{ github.run_number }}

      - name: Resolve version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: "*.jar"
          generate_release_notes: true

      - name: Publish to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: ${{ secrets.MODRINTH_PROJECT_ID }}
          version: ${{ steps.ver.outputs.VERSION }}
          name: "WorldEdit GUI ${{ steps.ver.outputs.VERSION }}"
          changelog: "See GitHub release notes: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          loaders: |-
            fabric
          game-versions: |-
            ${{ needs.build.outputs.minecraft_version }}
          files: |-
            *.jar
          primary-file: "wegui-${{ steps.ver.outputs.VERSION }}.jar"
          dependencies: |-
            [
              {"project_id": "P7dR8mSH", "dependency_type": "required"},
              {"project_id": "GcWjdA9I", "dependency_type": "required"},
              {"project_id": "1u6JkXh5", "dependency_type": "optional"}
            ]
