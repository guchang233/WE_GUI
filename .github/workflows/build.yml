name: Build

on:
  push:
    branches: [main, support/26.x]
    tags: ["v*"]
  pull_request:
    branches: [main, support/26.x]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v5
        with:
          name: WeGui-${{ github.run_number }}
          path: build/libs/*.jar
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          name: WeGui-${{ github.run_number }}

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: "*.jar"
          generate_release_notes: true

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          # 只发布主产物，排除 sources/dev jar
          # 注意：mc-publish 的 glob 需要显式路径前缀，否则排除规则不生效
          files: |
            build/libs/wegui-*.jar
            !build/libs/*-sources.jar
            !build/libs/*-dev.jar
            !build/libs/*-shadow.jar
          # 版本号从 tag 名提取（v0.4.9 -> 0.4.9）
          name: WeGui ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          version-type: release
          # 用 GitHub release 自动生成的 changelog
          changelog: ${{ github.event.release.body }}
          # changelog-file: CHANGELOG.md  # 不发布独立 changelog 文件
          loaders: fabric
          game-versions: |
            26.2
          dependencies: |
            fabric-api(required){modrinth:P7dR8mSH}
            malilib@>=0.29.2(required){modrinth:GcWjdA9I}
            litematica@>=0.28.4-(required){modrinth:bEpr0Arc}
            worldedit(optional){modrinth:1u6JkXh5}
          java: |
            25
          fail-mode: warn
