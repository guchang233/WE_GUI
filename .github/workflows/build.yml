name: Build

on:
  push:
    branches: [main, support/26.x]
    tags: ["v*"]
  pull_request:
    branches: [main, support/26.x]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v5
        with:
          name: WeGui-${{ github.run_number }}
          path: build/libs/*.jar
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine game versions from branch
        id: gamever
        shell: bash
        run: |
          # tag 触发时，检查 tag 所在 commit 属于哪个分支，决定 Modrinth game-versions
          # support/26.x 分支 -> 26.2
          # main 分支         -> 1.21.11
          git fetch origin --no-tags 2>/dev/null || true
          BRANCHES=$(git branch -r --contains ${{ github.sha }} 2>/dev/null || true)
          echo "Tag commit is on branches:"
          echo "$BRANCHES"
          if echo "$BRANCHES" | grep -q 'origin/support/26.x'; then
            echo "game-versions=26.2" >> "$GITHUB_OUTPUT"
            echo "target=support/26.x" >> "$GITHUB_OUTPUT"
          elif echo "$BRANCHES" | grep -q 'origin/main'; then
            echo "game-versions=1.21.11" >> "$GITHUB_OUTPUT"
            echo "target=main" >> "$GITHUB_OUTPUT"
          else
            # 默认按 support/26.x 处理（当前主开发分支）
            echo "game-versions=26.2" >> "$GITHUB_OUTPUT"
            echo "target=unknown(default 26.2)" >> "$GITHUB_OUTPUT"
          fi

      - name: Read changelog
        id: changelog
        shell: bash
        run: |
          # tag 名 v0.5.0 -> 版本号 0.5.0 -> 大写 0.5.0 -> 文件名 LOGS/CHANGELOG-V0.5.0.log
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION_UPPER=$(echo "$VERSION" | tr '[:lower:]' '[:upper:]')
          CHANGELOG_FILE="LOGS/CHANGELOG-V${VERSION_UPPER}.log"
          echo "Looking for changelog file: $CHANGELOG_FILE"
          if [ -f "$CHANGELOG_FILE" ]; then
            {
              echo "changelog<<EOF"
              cat "$CHANGELOG_FILE"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "changelog=" >> "$GITHUB_OUTPUT"
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "Warning: changelog file $CHANGELOG_FILE not found, will fall back to auto-generated notes"
          fi

      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          name: WeGui-${{ github.run_number }}

      - name: Keep only release jar
        shell: bash
        run: |
          echo "JARs before cleanup:"
          ls -la *.jar || true
          rm -f *-sources.jar *-dev.jar *-shadow.jar *-javadoc.jar
          echo "JARs after cleanup (release main file only):"
          ls -la *.jar

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: "*.jar"
          body: ${{ steps.changelog.outputs.changelog }}
          generate_release_notes: ${{ steps.changelog.outputs.found != 'true' }}

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          # 只上传主 release jar（已在上一 step 删除 sources/dev/shadow）
          files: "*.jar"
          # 版本号与名称从 tag 名提取（v0.5.0）
          name: WeGui ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          version-type: release
          # changelog 从 LOGS/CHANGELOG-V{VERSION}.log 文件读取
          changelog: ${{ steps.changelog.outputs.changelog }}
          loaders: fabric
          # game-versions 根据触发分支自动判断：
          #   support/26.x -> 26.2
          #   main         -> 1.21.11
          game-versions: ${{ steps.gamever.outputs.game-versions }}
          dependencies: |
            fabric-api(required){modrinth:P7dR8mSH}
            malilib@>=0.29.2(required){modrinth:GcWjdA9I}
            litematica@>=0.28.4-(required){modrinth:bEpr0Arc}
            worldedit(optional){modrinth:1u6JkXh5}
          java: |
            25
          fail-mode: warn
